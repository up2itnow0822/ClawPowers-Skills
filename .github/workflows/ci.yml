name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run verify:pack -- --json > pack.json
      - run: npm audit --omit=dev
      - name: Verify packaged WASM fallback artifacts
        run: |
          node -e "const fs=require('fs');const pack=JSON.parse(fs.readFileSync('pack.json','utf8'));const files=(pack[0]?.files||[]).map(f=>f.path);const required=['native/wasm/pkg-node/clawpowers_wasm.js','native/wasm/pkg-node/clawpowers_wasm_bg.wasm'];for(const file of required){if(!files.includes(file)){throw new Error('Missing packaged WASM artifact: '+file)}}console.log('WASM artifacts present in tarball.');"
