name: release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:wasm
      - run: npm run build
      - run: npm run verify:pack
      - run: npm run verify:consumer-install
      - run: npm audit --omit=dev
      - name: Read package metadata
        id: pkg
        run: |
          echo "name=$(node -p \"require('./package.json').name\")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"
      - name: Check npm for existing version
        id: npm_version
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Package version already exists on npm, skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Package version does not exist on npm, proceeding with publish."
          fi
      - run: npm publish --access public
        if: steps.npm_version.outputs.exists != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Note skipped npm publish
        if: steps.npm_version.outputs.exists == 'true'
        run: echo "Skipped npm publish because ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} is already published."
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
